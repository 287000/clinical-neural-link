<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Neural Link | Academic Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
 
        :root {
          --neon-blue: #3b82f6;
          --dark-bg: #050505;
        }
 
        body {
          margin: 0;
          font-family: 'Inter', sans-serif;
          background: var(--dark-bg);
          background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #050505 100%);
          color: white;
          overflow: hidden;
        }
 
        .glass-panel {
          background: rgba(255, 255, 255, 0.03);
          backdrop-filter: blur(12px);
          border: 1px solid rgba(255, 255, 255, 0.08);
          border-radius: 24px;
        }
 
        .btn-primary {
          background: var(--neon-blue);
          color: white;
          font-weight: 900;
          text-transform: uppercase;
          letter-spacing: 2px;
          transition: all 0.3s ease;
          box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }
 
        .btn-primary:hover {
          transform: translateY(-2px);
          box-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
        }
 
        .btn-danger {
          background: rgba(239, 68, 68, 0.1);
          color: #ef4444;
          border: 1px solid rgba(239, 68, 68, 0.2);
          font-weight: 900;
          text-transform: uppercase;
          letter-spacing: 1px;
          transition: all 0.3s ease;
        }
 
        .btn-danger:hover {
          background: #ef4444;
          color: white;
        }
 
        .course-card {
          transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
 
        .course-card:not(.frozen):hover {
          background: rgba(59, 130, 246, 0.1);
          border-color: var(--neon-blue);
          transform: scale(1.02);
        }
        .course-card.frozen {
          opacity: 0.2;
          cursor: not-allowed;
          filter: grayscale(1);
          pointer-events: none;
        }
 
        .admin-input {
          width: 100%;
          background: rgba(0, 0, 0, 0.4);
          border: 1px solid rgba(255, 255, 255, 0.1);
          padding: 1rem;
          border-radius: 12px;
          color: white;
          outline: none;
          font-size: 0.8rem;
        }
 
        .admin-input:focus { border-color: var(--neon-blue); }
 
        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(10px); }
          to { opacity: 1; transform: translateY(0); }
        }
 
        .page-enter { animation: fadeIn 0.5s ease forwards; }
 
        .timer-bar {
          height: 4px;
          background: var(--neon-blue);
          transition: width 1s linear;
          box-shadow: 0 0 10px var(--neon-blue);
          border-radius: 2px;
        }
 
        .switch {
          position: relative;
          display: inline-block;
          width: 40px;
          height: 20px;
        }
 
        .switch input { opacity: 0; width: 0; height: 0; }
 
        .slider {
          position: absolute;
          cursor: pointer;
          top: 0; left: 0; right: 0; bottom: 0;
          background-color: rgba(255, 255, 255, 0.1);
          transition: .4s;
          border-radius: 20px;
        }
 
        .slider:before {
          position: absolute;
          content: "";
          height: 14px;
          width: 14px;
          left: 3px;
          bottom: 3px;
          background-color: white;
          transition: .4s;
          border-radius: 50%;
        }
 
        input:checked + .slider { background-color: var(--neon-blue); }
        input:checked + .slider:before { transform: translateX(20px); }
        
        .diagram-view {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 250px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .diagram-view img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        .quiz-scroll-container {
            max-height: calc(100vh - 200px);
            overflow-y: auto;
            padding-right: 10px;
        }
        
        .quiz-scroll-container::-webkit-scrollbar {
            width: 4px;
        }
        .quiz-scroll-container::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.3);
            border-radius: 10px;
        }

        .builder-scroll {
            max-height: 550px;
            overflow-y: auto;
            padding-right: 10px;
        }
        .builder-scroll::-webkit-scrollbar { width: 4px; }
        .builder-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>
 
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const SUPABASE_URL = 'https://jdspqwqxkvuujjsqrbpo.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ywhLjqdNu7KGp-SMBFDm0Q_R8wOH5vI';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
 
        const ADMIN_KEY = "ADMIN2026";
 
        const ACADEMIC_STRUCTURE = {
          "MBchB, BDS and CM": {
              "2nd Year": ["Anatomy","Pathology","Physiology","Biochemistry","Therapeutics","Clinical Science","Society and Medicine","Laboratory Science","Diagnostics","Public Health"],
              "3rd Year": ["Anatomy","Pathology","Physiology","Biochemistry","Therapeutics","Clinical Science","Society and Medicine","Laboratory Science","Diagnostics","Public Health"],
              "4th Year BDS": ["Clinical Dentistry","Oral Pathology","Maxillofacial Surgery"],
              "5th Year BDS": ["Advanced Clinical Practice","Pedodontics"],
              "6th Year BDS": ["Final Clinical Rotation"]
          },
          "Biomedical Science": {
              "2nd Year": ["Introduction to Biomedical Science","Introduction to Human Anatomy","Introduction to Medical Physiology","Introduction to Medical Microbiology","General Biochemistry"],
              "3rd Year": ["Society and Medicine","Histology","Physiology","Parasitology","Virology/Mycology","Biochemistry","Molecular and Cell Biology","Bacteriology"],
              "4th Year": ["Public Health","General and systematic Pathology","Pharmacology, Therapeutics and Toxicology","Immunology","Medical Genetics","Biostatics","Haematology and Blood Transfusion","Research Methodology"],
              "5th Year": ["Skills in Laboratory Management","Medical Teaching Methodology","Cellular Pathology","Clinical Biochemistry","Research Project"]
          },
          "Public Health": {
              "2nd Year": ["Primary Health Care","Microbiology","Health promotion","Human Anatomy and Physiology","Environmental health"],
              "3rd Year": ["Psychology and Medicine","Epidemiology","Food Technology and Hygiene","Monitoring and Evaluation","Research and Biostatistics"],
              "4th Year": ["Emerging Public Health issues","Occupational Health and Ergonomics","Food and Nutrition","Research Project and Data Management","Industrial Attachment"],
              "5th Year": ["Global Health","Health Policies and Economics","Medical Parasitology","Health system, Management II and Health Promotion II","Basic Pharmacology and Toxicology"]
          },
          "Environmental Health": {
              "2nd Year": ["Principles of Building and Construction","Primary Health Care","Environmental Health","Microbiology","Human Anatomy and Physiology"],
              "3rd Year": ["Biostatistics and Research","Food Animal Anatomy and Slaughter houses", "Epidemiology","Food Technology and hygiene","Building development and Planning"],
              "4th Year": ["Occupational Health and Ergonomics","Industrial Training","Food animal Pathology and meat inspections", "Food and Nutrition", "Inspection of premises and reporting", "Research project and Data Management"],
              "5th Year": ["Environmental economics, management, laws and policies", "Medical parasitology", "Occupational Health and Risk Analysis", "Food processing and inspection", "Basic Pharmacology and Toxicology", "Environmental Health", "Introduction to Public Health"]
          }
        };
        const PROGRAM_MAP = {
            'M': "MBchB, BDS and CM",
            'B': "Biomedical Science",
            'P': "Public Health",
            'E': "Environmental Health"
        };
 
        const LIBRARIES = [
            "Practice Questions MCQs", 
            "Practice Questions T/F", 
            "Practice Questions S/A", 
            "Past Paper Questions"
        ];
 
        function Icon({ name, className }) {
          useEffect(() => { if (window.lucide) lucide.createIcons(); }, [name]);
          return <i data-lucide={name} className={className}></i>;
        }
 
        function App() {
          const [user, setUser] = useState(null);
          const [authorizedIds, setAuthorizedIds] = useState([]);
          const [view, setView] = useState('home');
          const [loading, setLoading] = useState(true);
          const [program, setProgram] = useState(null);
          const [year, setYear] = useState(null);
          const [course, setCourse] = useState(null);
          const [library, setLibrary] = useState(null);
          const [quizzes, setQuizzes] = useState([]);
          const [activeQuiz, setActiveQuiz] = useState(null);
          const [blitzEnabled, setBlitzEnabled] = useState(false);
 
          useEffect(() => {
              const savedUser = localStorage.getItem('clinic_user');
              if (savedUser) setUser(JSON.parse(savedUser));

              const savedIds = localStorage.getItem('authorized_students');
              if (savedIds) {
                  setAuthorizedIds(JSON.parse(savedIds));
              } else {
                  const initial = ["23130155-B-2", "1156-M-3", "1290-P-4"];
                  setAuthorizedIds(initial);
                  localStorage.setItem('authorized_students', JSON.stringify(initial));
              }
              setTimeout(() => setLoading(false), 800);
          }, []);

          const uploadQuiz = async (quizName, quizObject) => {
              const { data, error } = await supabase.from('quizzes').insert([
                  { name: quizName, data: quizObject }
              ]).select();
              if (error) throw error;
              return data;
          };

          useEffect(() => {
              let isMounted = true;

              const fetchQuizzes = async () => {
                  const { data, error } = await supabase
                      .from('quizzes')
                      .select('id, name, data, created_at')
                      .order('created_at', { ascending: false });
                  if (error) {
                      console.error('Failed to fetch quizzes:', error);
                      return;
                  }
                  if (!isMounted || !Array.isArray(data)) return;
                  const normalized = data.map((row) => ({
                      id: row.id,
                      ...(row.data || {}),
                      title: row.data?.title || row.name
                  }));
                  setQuizzes(normalized);
              };

              fetchQuizzes();

              const quizChannel = supabase
                  .channel('quizzes-insert-listener')
                  .on(
                      'postgres_changes',
                      { event: 'INSERT', schema: 'public', table: 'quizzes' },
                      (payload) => {
                          const row = payload.new || {};
                          const liveQuiz = {
                              id: row.id,
                              ...(row.data || {}),
                              title: row.data?.title || row.name
                          };
                          setQuizzes((prev) => [liveQuiz, ...prev.filter((q) => q.id !== liveQuiz.id)]);
                      }
                  )
                  .subscribe((status) => {
                      if (status === 'CHANNEL_ERROR') {
                          console.error('Realtime quiz listener failed: channel error');
                      }
                  });

              return () => {
                  isMounted = false;
                  supabase.removeChannel(quizChannel);
              };
          }, []);
 
          const handleLogout = () => {
              localStorage.removeItem('clinic_user');
              setUser(null); setProgram(null); setYear(null); setCourse(null); setLibrary(null); setView('home');
          };
 
          if (loading) return <div className="h-screen flex items-center justify-center font-black text-blue-500 tracking-widest uppercase italic">Initializing Neural Link...</div>;
 
          if (!user) return (
              <div className="h-screen flex items-center justify-center p-6">
                  <div className="glass-panel w-full max-w-md p-10 text-center">
                      <Icon name="fingerprint" className="text-blue-500 w-12 h-12 mx-auto mb-6" />
                      <h1 className="text-2xl font-black italic uppercase mb-8">Access Portal</h1>
                      <form onSubmit={(e) => {
                          e.preventDefault();
                          const inputId = e.target.id.value;
                          
                          if (inputId === ADMIN_KEY) {
                              const adminProfile = { name: "ADMIN", id: "ADMIN", role: 'admin' };
                              setUser(adminProfile);
                              localStorage.setItem('clinic_user', JSON.stringify(adminProfile));
                              return;
                          }
                          const permissionString = authorizedIds.find(str => str.startsWith(inputId + "-"));
                          
                          if (permissionString) {
                              const [id, progCode, yearNum] = permissionString.split("-");
                              const profile = { 
                                  name: e.target.name.value, 
                                  id, 
                                  role: 'student',
                                  allowedProgram: PROGRAM_MAP[progCode],
                                  allowedYear: `${yearNum}${yearNum === "2" ? "nd" : yearNum === "3" ? "rd" : "th"} Year`
                              };
                              setUser(profile);
                              localStorage.setItem('clinic_user', JSON.stringify(profile));
                          } else {
                              alert("ACCESS DENIED: NO PERMISSION STRING FOUND FOR THIS ID");
                          }
                      }} className="space-y-4">
                          <input name="name" placeholder="FULL NAME" required className="admin-input"/>
                          <input name="id" type="text" placeholder="STUDENT NUMBER" required className="admin-input text-center" />
                          <button className="btn-primary w-full py-4 rounded-xl">Connect</button>
                      </form>
                  </div>
              </div>
          );
 
          return (
              <div className="h-screen flex flex-col">
                  <nav className="p-4 px-6 border-b border-white/5 flex justify-between items-center bg-black/20">
                      <div 
                        className="flex items-start gap-4" 
                        onClick={() => { if (view !== 'quiz') { setView('home'); setProgram(null); setYear(null); setCourse(null); setLibrary(null); } }} 
                        style={{ cursor: 'pointer' }}
                      >
                          <div className="bg-blue-500/10 p-2 rounded-lg border border-blue-500/20">
                            <Icon name="brain-circuit" className="text-blue-500 w-6 h-6" />
                          </div>
                          <div className="flex flex-col">
                            <div className="flex items-center gap-2">
                                <span className="text-[10px] font-black uppercase text-blue-400 tracking-tighter">Student Name:</span>
                                <span className="text-xs font-black italic uppercase tracking-wider">{user.name}</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <span className="text-[10px] font-black uppercase text-blue-400 tracking-tighter">Student ID:</span>
                                <span className="text-xs font-mono font-bold opacity-80">{user.id}</span>
                            </div>
                          </div>
                      </div>
                      <div className="flex gap-4">
                          {user.role === 'admin' && view !== 'quiz' && <button onClick={() => setView(view === 'admin' ? 'home' : 'admin')} className="text-[10px] font-black uppercase bg-blue-600 px-4 py-2 rounded-lg">Admin Hub</button>}
                          <button onClick={handleLogout} className="text-red-500 hover:scale-110 transition-transform"><Icon name="log-out" /></button>
                      </div>
                  </nav>
 
                  <main className="flex-1 overflow-y-auto p-4 md:p-10">
                      {view === 'admin' ? (
                          <AdminPanel 
                              quizzes={quizzes} 
                              authorizedIds={authorizedIds}
                              setAuthorizedIds={(list) => { setAuthorizedIds(list); localStorage.setItem('authorized_students', JSON.stringify(list)); }}
                              onDelete={async (id) => {
                                  const { error } = await supabase.from('quizzes').delete().eq('id', id);
                                  if (error) throw error;
                                  setQuizzes((prev) => prev.filter((q) => q.id !== id));
                              }}
                              onSave={async (q) => {
                                  await uploadQuiz(q.title, q);
                              }}
                          />
                      ) : view === 'quiz' ? (
                          <QuizInterface quiz={activeQuiz} isBlitz={blitzEnabled} onQuit={() => setView('home')} />
                      ) : (
                          <Portal 
    user={user}
    program={program} setProgram={setProgram}
    year={year} setYear={setYear}
    course={course} setCourse={setCourse}
    library={library} setLibrary={setLibrary}
    quizzes={quizzes}
    blitzEnabled={blitzEnabled}
    setBlitzEnabled={setBlitzEnabled}
    startQuiz={(q) => { setActiveQuiz(q); setView('quiz'); }}
                          />
                      )}
                  </main>
              </div>
          );
        }
 
        function Portal({ user, program, setProgram, year, setYear, course, setCourse, library, setLibrary, quizzes, blitzEnabled, setBlitzEnabled, startQuiz }) {
          if (!program) return (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6 page-enter">
                  {Object.keys(ACADEMIC_STRUCTURE).map(p => {
                      const isFrozen = user.role !== 'admin' && user.allowedProgram !== p;
                      return (
                        <div key={p} 
                            onClick={() => !isFrozen && setProgram(p)} 
                            className={`glass-panel p-10 text-center course-card cursor-pointer ${isFrozen ? 'frozen' : ''}`}>
                            <h3 className="text-xl font-black italic uppercase">{p}</h3>
                            {isFrozen && <div className="text-[9px] mt-2 opacity-50">LOCKED</div>}
                        </div>
                      );
                  })}
              </div>
          );
 
          if (!year) return (
              <div className="page-enter">
                  <button onClick={() => setProgram(null)} className="text-blue-500 text-[10px] font-black mb-6 uppercase">← Back</button>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      {Object.keys(ACADEMIC_STRUCTURE[program]).map(y => {
                          const isFrozen = user.role !== 'admin' && user.allowedYear !== y;
                          return (
                            <div key={y} 
                                onClick={() => !isFrozen && setYear(y)} 
                                className={`glass-panel p-8 text-center course-card cursor-pointer uppercase font-black ${isFrozen ? 'frozen' : ''}`}>
                                {y}
                                {isFrozen && <div className="text-[9px] opacity-50">LOCKED</div>}
                            </div>
                          );
                      })}
                  </div>
              </div>
          );
 
          if (!course) return (
              <div className="page-enter">
                  <button onClick={() => setYear(null)} className="text-blue-500 text-[10px] font-black mb-6 uppercase">← Back</button>
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                      {ACADEMIC_STRUCTURE[program][year].map(c => (
                          <div key={c} onClick={() => setCourse(c)} className="glass-panel p-6 text-center course-card cursor-pointer text-[10px] font-bold uppercase">{c}</div>
                      ))}
                  </div>
              </div>
          );
 
          if (!library) return (
              <div className="page-enter">
                  <button onClick={() => setCourse(null)} className="text-blue-500 text-[10px] font-black mb-6 uppercase">← Back</button>
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                      {LIBRARIES.map(l => (
                          <div key={l} onClick={() => setLibrary(l)} className="glass-panel p-8 text-center course-card cursor-pointer font-black uppercase text-xs">{l}</div>
                      ))}
                  </div>
              </div>
          );
 
          const filtered = quizzes.filter(q => q.program === program && q.year === year && q.course === course && q.library === library);
 
          return (
              <div className="page-enter">
                  <div className="flex justify-between items-center mb-6">
                      <button onClick={() => setLibrary(null)} className="text-blue-500 text-[10px] font-black uppercase">← Back</button>
                      <div className="glass-panel px-4 py-2 flex items-center gap-3">
                          <span className={`text-[10px] font-black uppercase ${blitzEnabled ? 'text-blue-400' : 'opacity-40'}`}>Neural Blitz (15s)</span>
                          <label className="switch">
                              <input type="checkbox" checked={blitzEnabled} onChange={() => setBlitzEnabled(!blitzEnabled)} />
                              <span className="slider"></span>
                          </label>
                      </div>
                  </div>
                  <div className="space-y-4">
                      {filtered.length > 0 ? filtered.map(q => (
                          <div key={q.id} className="glass-panel p-8 flex justify-between items-center">
                              <h4 className="text-xl font-black italic uppercase">{q.title}</h4>
                              <button onClick={() => startQuiz(q)} className="btn-primary px-8 py-3 rounded-xl text-[10px]">Start</button>
                          </div>
                      )) : <div className="opacity-30 text-center py-20 font-black uppercase italic tracking-widest">No Assessments Found</div>}
                  </div>
              </div>
          );
        }
 
        function AdminPanel({ onSave, quizzes, onDelete, authorizedIds, setAuthorizedIds }) {
          const [mode, setMode] = useState('builder');
          const [json, setJson] = useState('');
          const [meta, setMeta] = useState({ 
              title: '',
              program: 'MBchB, BDS and CM', 
              year: '2nd Year', 
              course: 'Anatomy',
              library: 'Practice Questions MCQs' 
          });

          const [builderQuestions, setBuilderQuestions] = useState([
            { q: '', options: ['', '', '', ''], answer: 0, explanation: '', image: null }
          ]);
          React.useEffect(() => {
          const currentCourses = ACADEMIC_STRUCTURE[meta.program][meta.year];
          if (!currentCourses.includes(meta.course)) {
            setMeta(prev => ({ ...prev, course: currentCourses[0] }));
          }
        }, [meta.program, meta.year]);
 
          const [loggedInUser, setLoggedInUser] = useState(null);
          useEffect(() => {
              const session = localStorage.getItem('clinic_user');
              if (session) setLoggedInUser(JSON.parse(session));
          }, []);

          const handleImageUpload = (qIdx, file) => {
              if (!file) return;
              const reader = new FileReader();
              reader.onload = (e) => {
                  updateQuestion(qIdx, 'image', e.target.result);
              };
              reader.readAsDataURL(file);
          };

          const handleDeploy = async () => {
    if (!meta.title) return alert("Please enter a title");
    try {
      const quizData = {
        ...meta,
        questions: mode === 'json' ? JSON.parse(json).questions : builderQuestions
      };

      await onSave(quizData);
      alert("Deployment saved to Supabase.");

      setMeta({ ...meta, title: '' });
      setJson('');
      setBuilderQuestions([{ q: '', options: ['', '', '', ''], answer: 0, explanation: '', image: null }]);
    } catch (error) {
      console.error('Failed to deploy quiz:', error);
      alert("Failed to save quiz. Check console and Supabase table/RLS.");
    }
  };

          const addQuestion = () => {
              setBuilderQuestions([...builderQuestions, { q: '', options: ['', '', '', ''], answer: 0, explanation: '', image: null }]);
          };

          const updateQuestion = (idx, field, value) => {
              const updated = [...builderQuestions];
              updated[idx][field] = value;
              setBuilderQuestions(updated);
          };

          const updateOption = (qIdx, optIdx, val) => {
              const updated = [...builderQuestions];
              updated[qIdx].options[optIdx] = val;
              setBuilderQuestions(updated);
          };

          const removeQuestion = (idx) => {
              if (builderQuestions.length > 1) {
                  setBuilderQuestions(builderQuestions.filter((_, i) => i !== idx));
              }
          };
 
          return (
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 page-enter pb-20">
                  <div className="lg:col-span-3 space-y-6">
                      <div className="glass-panel p-8 border-l-4 border-blue-500">
                          <h2 className="font-black italic uppercase mb-2 text-blue-500 text-xs">Access Provision</h2>
                          <p className="text-[8px] opacity-40 uppercase mb-4">Format: ID-CODE-YEAR</p>
                          <input placeholder="23130155-B-2" className="admin-input mb-4" id="newId" onKeyDown={e => { if (e.key === 'Enter') { setAuthorizedIds([...authorizedIds, e.target.value]); e.target.value = ''; } }} />
                          <div className="space-y-2 max-h-[25vh] overflow-y-auto pr-2">
                              {authorizedIds.map(id => (
                                  <div key={id} className="bg-white/5 p-3 rounded-lg flex justify-between items-center text-[10px] font-bold">
                                      {id}
                                      <button onClick={() => setAuthorizedIds(authorizedIds.filter(i => i !== id))} className="text-red-500"><Icon name="trash-2" className="w-3 h-3" /></button>
                                  </div>
                              ))}
                          </div>
                      </div>
                      <div className="glass-panel p-8 border-l-4 border-green-500">
                          <h2 className="font-black italic uppercase mb-4 text-green-500 text-xs">Active Sessions</h2>
                          {loggedInUser ? (
                              <div className="flex items-center gap-3 bg-white/5 p-3 rounded-lg">
                                  <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                                  <span className="text-[10px] font-black uppercase">{loggedInUser.name} ({loggedInUser.id})</span>
                              </div>
                          ) : <div className="text-[10px] opacity-40 uppercase">No active sessions</div>}
                      </div>

                      <div className="glass-panel p-8">
                        <h2 className="font-black italic uppercase mb-4 text-xs text-blue-500">Live Inventory</h2>
                        <div className="space-y-3 max-h-[40vh] overflow-y-auto pr-2">
                            {quizzes.map(q => (
                                <div key={q.id} className="bg-white/5 p-4 rounded-xl border border-white/5 flex justify-between items-start">
                                    <div className="flex-1">
                                        <div className="text-[8px] font-black uppercase text-blue-400">{q.course}</div>
                                        <div className="text-[10px] font-black uppercase truncate max-w-[120px]">{q.title}</div>
                                    </div>
                                    <button onClick={() => onDelete(q.id)} className="text-red-500"><Icon name="trash-2" className="w-3 h-3" /></button>
                                </div>
                            ))}
                        </div>
                      </div>
                  </div>
 
                  <div className="lg:col-span-9 space-y-6">
                    <div className="glass-panel p-8">
                        <div className="flex justify-between items-center mb-8">
                            <h2 className="font-black italic uppercase text-blue-500 text-lg">Deploy Neural Assessment</h2>
                            <div className="flex bg-black/40 p-1 rounded-xl border border-white/10">
                                <button onClick={() => setMode('builder')} className={`px-4 py-2 rounded-lg text-[10px] font-black uppercase transition-all ${mode === 'builder' ? 'bg-blue-600 text-white' : 'opacity-40'}`}>Interactive Builder</button>
                                <button onClick={() => setMode('json')} className={`px-4 py-2 rounded-lg text-[10px] font-black uppercase transition-all ${mode === 'json' ? 'bg-blue-600 text-white' : 'opacity-40'}`}>JSON Mode</button>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 mb-8">
                            <div className="lg:col-span-2">
                                <label className="text-[9px] font-black uppercase opacity-50 ml-1">Assessment Title</label>
                                <input placeholder="e.g. Mid-Term Anatomy Quiz" className="admin-input" value={meta.title} onChange={e => setMeta({ ...meta, title: e.target.value })} />
                            </div>
                            <div>
                                <label className="text-[9px] font-black uppercase opacity-50 ml-1">Program</label>
                                <select className="admin-input" value={meta.program} onChange={e => setMeta({ ...meta, program: e.target.value })}>
                                    {Object.keys(ACADEMIC_STRUCTURE).map(p => <option key={p} value={p}>{p}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="text-[9px] font-black uppercase opacity-50 ml-1">Year</label>
                                <select className="admin-input" value={meta.year} onChange={e => setMeta({ ...meta, year: e.target.value })}>
                                    {Object.keys(ACADEMIC_STRUCTURE[meta.program]).map(y => <option key={y} value={y}>{y}</option>)}
                                </select>
                            </div>
                            <div>
        <label className="text-[9px] font-black uppercase opacity-50 ml-1">Target Course</label>
        <select value={meta.course} onChange={e => setMeta({...meta, course: e.target.value})} className="admin-input">
            {ACADEMIC_STRUCTURE[meta.program][meta.year].map(c => (
                <option key={c} value={c}>{c}</option>
            ))}
        </select>
    </div>
                            <div>
                                <label className="text-[9px] font-black uppercase opacity-50 ml-1">Library</label>
                                <select className="admin-input" value={meta.library} onChange={e => setMeta({ ...meta, library: e.target.value })}>
                                    {LIBRARIES.map(l => <option key={l} value={l}>{l}</option>)}
                                </select>
                            </div>
                        </div>

                        {mode === 'json' ? (
                            <div className="space-y-4">
                                <textarea placeholder='{"questions": [...] }' className="admin-input h-[400px] font-mono text-xs" value={json} onChange={e => setJson(e.target.value)} />
                            </div>
                        ) : (
                            <div className="space-y-8 builder-scroll mb-6">
                                {builderQuestions.map((bq, qIdx) => (
                                    <div key={qIdx} className="bg-white/5 border border-white/5 p-6 rounded-2xl relative">
                                        <div className="flex justify-between items-center mb-4">
                                            <span className="text-[10px] font-black text-blue-500 uppercase">Question #{qIdx + 1}</span>
                                            <button onClick={() => removeQuestion(qIdx)} className="text-red-500 opacity-50 hover:opacity-100"><Icon name="x-circle" className="w-4 h-4" /></button>
                                        </div>
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-4">
                                            <div className="md:col-span-3">
                                                <input 
                                                    placeholder="The question text..." 
                                                    className="admin-input mb-4" 
                                                    value={bq.q} 
                                                    onChange={e => updateQuestion(qIdx, 'q', e.target.value)}
                                                />
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                                    {bq.options ? bq.options.map((opt, oIdx) => (
                                                        <div key={oIdx} className="flex items-center gap-2 bg-black/20 p-2 rounded-xl">
                                                            <input 
                                                                type="radio" 
                                                                name={`correct-${qIdx}`} 
                                                                checked={bq.answer === oIdx} 
                                                                onChange={() => updateQuestion(qIdx, 'answer', oIdx)}
                                                            />
                                                            <input 
                                                                placeholder={`Option ${oIdx + 1}`} 
                                                                className="bg-transparent text-xs w-full outline-none" 
                                                                value={opt} 
                                                                onChange={e => updateOption(qIdx, oIdx, e.target.value)}
                                                            />
                                                        </div>
                                                    )) : (
                                                        <div className="col-span-2">
                                                            <input 
                                                                placeholder="Correct Answer (Short Text)" 
                                                                className="admin-input" 
                                                                value={bq.answer} 
                                                                onChange={e => updateQuestion(qIdx, 'answer', e.target.value)}
                                                            />
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                            <div className="md:col-span-1">
                                                <div className="h-full min-h-[120px] glass-panel border-dashed border-2 flex flex-col items-center justify-center p-2 relative overflow-hidden group">
                                                    {bq.image ? (
                                                        <>
                                                            <img src={bq.image} className="absolute inset-0 w-full h-full object-cover opacity-40" />
                                                            <button onClick={() => updateQuestion(qIdx, 'image', null)} className="absolute top-2 right-2 bg-black/60 rounded-full p-1"><Icon name="x" className="w-3 h-3 text-red-400"/></button>
                                                            <span className="relative text-[8px] font-black uppercase bg-black/50 px-2 py-1 rounded">Update Image</span>
                                                        </>
                                                    ) : (
                                                        <div className="text-center">
                                                            <Icon name="image-plus" className="w-6 h-6 mx-auto mb-2 opacity-30" />
                                                            <span className="text-[8px] font-black uppercase opacity-40">Add Diagram</span>
                                                        </div>
                                                    )}
                                                    <input type="file" accept="image/*" onChange={(e) => handleImageUpload(qIdx, e.target.files[0])} className="absolute inset-0 opacity-0 cursor-pointer" />
                                                </div>
                                            </div>
                                        </div>

                                        <div className="flex gap-4">
                                            <button 
                                                onClick={() => updateQuestion(qIdx, 'options', bq.options ? null : ['', '', '', ''])}
                                                className="text-[9px] font-black uppercase text-blue-400 opacity-70 hover:opacity-100"
                                            >
                                                Switch to {bq.options ? 'Short Answer' : 'MCQ'}
                                            </button>
                                            <input 
                                                placeholder="Explanation / Neural Insight (Optional)" 
                                                className="bg-transparent border-b border-white/10 text-[10px] flex-1 outline-none pb-1"
                                                value={bq.explanation}
                                                onChange={e => updateQuestion(qIdx, 'explanation', e.target.value)}
                                            />
                                        </div>
                                    </div>
                                ))}
                                <button onClick={addQuestion} className="w-full py-4 border-2 border-dashed border-white/10 rounded-2xl text-[10px] font-black uppercase opacity-50 hover:opacity-100 hover:border-blue-500 transition-all">+ Add Next Question</button>
                            </div>
                        )}

                        <button onClick={handleDeploy} className="btn-primary w-full py-6 rounded-2xl text-xs mt-4">Initialize Deployment</button>
                    </div>
                  </div>
              </div>
          );
        }
 
        function QuizInterface({ quiz, isBlitz, onQuit }) {
          const [step, setStep] = useState(0);
          const [score, setScore] = useState(0);
          const [timeLeft, setTimeLeft] = useState(15);
          const [userSelection, setUserSelection] = useState(null);
          const [shortAnswer, setShortAnswer] = useState("");
          const [isCorrect, setIsCorrect] = useState(null);
          const [done, setDone] = useState(false);
          const timerRef = useRef(null);
 
          const q = quiz.questions[step];
          const hasAnswered = userSelection !== null || isCorrect !== null;
 
          const handleNext = () => {
              if (step + 1 < quiz.questions.length) {
                  setStep(step + 1);
                  setUserSelection(null);
                  setShortAnswer("");
                  setIsCorrect(null);
                  setTimeLeft(15);
              } else {
                  setDone(true);
              }
          };
 
          const checkShortAnswer = () => {
              const cleanUser = shortAnswer.trim().toLowerCase();
              let isMatch = false;
              if (Array.isArray(q.answer)) {
                  isMatch = q.answer.some(ans => ans.toString().toLowerCase().trim() === cleanUser);
              } else {
                  isMatch = q.answer.toString().toLowerCase().trim() === cleanUser;
              }
              if (isMatch) {
                  setScore(score + 1);
                  setIsCorrect(true);
              } else {
                  setIsCorrect(false);
              }
          };
 
          useEffect(() => {
              if (isBlitz && !done && !hasAnswered) {
                  timerRef.current = setInterval(() => {
                      setTimeLeft(p => {
                          if (p <= 1) { clearInterval(timerRef.current); handleNext(); return 0; }
                          return p - 1;
                      });
                  }, 1000);
              }
              return () => clearInterval(timerRef.current);
          }, [step, isBlitz, hasAnswered, done]);
 
          if (done) return (
              <div className="text-center p-20 glass-panel page-enter max-w-xl mx-auto">
                  <h2 className="text-6xl font-black mb-4 text-blue-500">{Math.round((score / quiz.questions.length) * 100)}%</h2>
                  <p className="uppercase font-bold opacity-40 mb-10">{score} / {quiz.questions.length} Correct</p>
                  <button onClick={onQuit} className="btn-primary px-10 py-4 rounded-xl text-[10px]">Return to Hub</button>
              </div>
          );
 
          return (
              <div className={`page-enter w-full mx-auto ${q.image ? 'max-w-6xl' : 'max-w-xl'}`}>
                  <div className={`grid gap-6 ${q.image ? 'grid-cols-1 lg:grid-cols-2' : 'grid-cols-1'}`}>
                      {q.image && (
                        <div className="glass-panel p-6 flex flex-col">
                            <div className="flex items-center gap-2 mb-4 border-b border-white/5 pb-2">
                                <Icon name="image" className="text-blue-500 w-4 h-4" />
                                <span className="text-[10px] font-black uppercase text-blue-400">Biological Diagram</span>
                            </div>
                            <div className="flex-1 flex items-center justify-center diagram-view">
                                <img src={q.image} alt="Medical Diagram" />
                            </div>
                        </div>
                      )}
                      <div className="glass-panel p-10 flex flex-col justify-between space-y-6 relative h-full">
                          <div className="flex justify-between items-center">
                              <div className="text-[10px] font-black opacity-40 uppercase">Question {step + 1} / {quiz.questions.length}</div>
                              <button onClick={onQuit} className="btn-danger px-3 py-1 rounded-md text-[9px]">Quit Quiz</button>
                          </div>
                          {isBlitz && (
                              <div className="bg-white/5 h-1 rounded-full overflow-hidden">
                                  <div className="timer-bar" style={{ width: `${(timeLeft / 15) * 100}%` }}></div>
                              </div>
                          )}
                          <div className="quiz-scroll-container">
                              <h3 className="text-lg font-bold mb-6">{q.q}</h3>
                              {q.options ? (
                                  <div className="grid gap-2">
                                      {q.options.map((opt, i) => {
                                          let btnClass = "border-white/10 hover:border-blue-500";
                                          if (userSelection !== null) {
                                              if (i === q.answer) {
                                                  btnClass = "bg-green-500/20 border-green-500 text-green-400 shadow-[0_0_15px_rgba(34,197,94,0.3)]";
                                              } else if (i === userSelection) {
                                                  btnClass = "bg-red-500/20 border-red-500 text-red-400";
                                              } else {
                                                  btnClass = "opacity-30 border-white/10";
                                              }
                                          }
                                          return (
                                              <button key={i} onClick={() => { if (!hasAnswered) { setUserSelection(i); if (i === q.answer) setScore(score + 1); } }} className={`p-4 rounded-xl border text-left font-bold transition-all ${btnClass}`}>
                                                  {opt}
                                              </button>
                                          );
                                      })}
                                  </div>
                              ) : (
                                  <div className="space-y-4">
                                      <textarea 
                                          rows="2"
                                          value={shortAnswer} 
                                          disabled={hasAnswered} 
                                          onChange={(e) => setShortAnswer(e.target.value)} 
                                          placeholder="Type medical answer..." 
                                          className={`admin-input text-lg font-bold ${isCorrect === true ? 'border-green-500 bg-green-500/10' : isCorrect === false ? 'border-red-500 bg-red-500/10' : ''}`}
                                      />
                                      {!hasAnswered && <button onClick={checkShortAnswer} className="btn-primary w-full py-4 rounded-xl">Submit Answer</button>}
                                  </div>
                              )}
                              {hasAnswered && (
                                  <div className="page-enter bg-blue-500/5 border border-blue-500/20 p-6 rounded-2xl mt-6">
                                      <div className="flex items-center gap-2 mb-2">
                                          <Icon name="info" className="text-blue-400 w-4 h-4" />
                                          <span className="text-[10px] font-black uppercase text-blue-400">Neural Insight</span>
                                      </div>
                                      <p className="text-sm opacity-80 leading-relaxed italic">
                                          {q.explanation || "System analysis confirms this as the core concept."}
                                      </p>
                                      {isCorrect === false && !q.options && <div className="mt-2 text-xs font-black text-green-500 uppercase">Correct Answer: {Array.isArray(q.answer) ? q.answer[0] : q.answer}</div>}
                                      <button onClick={handleNext} className="btn-primary w-full py-4 rounded-xl mt-6">Continue Link</button>
                                  </div>
                              )}
                          </div>
                      </div>
                  </div>
              </div>
          );
        }
 
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
